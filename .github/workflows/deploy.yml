name: deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/a2a-mcp:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/a2a-mcp:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.APP_DIR }}"
            export IMAGE_TAG=${{ github.sha }}
            docker pull ghcr.io/${{ github.repository_owner }}/a2a-mcp:${{ github.sha }}
            docker tag ghcr.io/${{ github.repository_owner }}/a2a-mcp:${{ github.sha }} a2a-mcp:${{ github.sha }}
            docker compose --env-file .env.production up -d
            docker compose ps
