services:
  a2a-mcp:
    image: a2a-mcp:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    ports:
      - "${MCP_PORT:-3000}:${MCP_PORT:-3000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:'+(process.env.MCP_PORT||process.env.PORT||3000)+'/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
